<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <!-- Red neon glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients for isometric faces -->
    <!-- Top face -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2244"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <!-- Left face -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d0f00"/>
      <stop offset="100%" stop-color="#1f0a0f"/>
    </linearGradient>
    <!-- Right face -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b1010"/>
      <stop offset="100%" stop-color="#150505"/>
    </linearGradient>
    <!-- Rack unit top -->
    <linearGradient id="rackTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4466"/>
      <stop offset="100%" stop-color="#cc1133"/>
    </linearGradient>
    <!-- Base top -->
    <linearGradient id="baseTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3355"/>
      <stop offset="100%" stop-color="#990022"/>
    </linearGradient>
    <!-- Shadow -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1133" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ff1133" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff1133" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow lines under base -->
  <g opacity="0.6">
    <line x1="100" y1="198" x2="140" y2="178" stroke="url(#shadowGrad)" stroke-width="1.5"/>
    <line x1="100" y1="202" x2="145" y2="180" stroke="url(#shadowGrad)" stroke-width="1"/>
    <line x1="100" y1="206" x2="148" y2="183" stroke="url(#shadowGrad)" stroke-width="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════════
       BASE PLATFORM
  ═══════════════════════════════════════════ -->
  <!-- Base left face -->
  <polygon points="60,188 100,210 100,200 60,178" fill="url(#leftFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Base right face -->
  <polygon points="100,210 140,188 140,178 100,200" fill="url(#rightFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Base top face -->
  <polygon points="60,178 100,200 140,178 100,156" fill="url(#baseTop)" filter="url(#softglow)" stroke="#ff4466" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════
       RACK UNIT 3 (bottom)
  ═══════════════════════════════════════════ -->
  <!-- Left face -->
  <polygon points="60,178 100,156 100,120 60,142" fill="url(#leftFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Right face -->
  <polygon points="100,156 140,178 140,142 100,120" fill="url(#rightFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="60,142 100,120 140,142 100,164" fill="url(#rackTop)" filter="url(#softglow)" stroke="#ff4466" stroke-width="0.8"/>

  <!-- Rack 3 details - left face vents -->
  <g filter="url(#softglow)" opacity="0.9">
    <line x1="65" y1="148" x2="85" y2="159" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="153" x2="85" y2="164" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="158" x2="85" y2="169" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="163" x2="85" y2="174" stroke="#ff6688" stroke-width="1.2"/>
  </g>
  <!-- Rack 3 details - right face dots -->
  <g filter="url(#softglow)" opacity="0.8">
    <circle cx="115" cy="148" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="151" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="154" r="1.5" fill="#ff4466"/>
    <circle cx="115" cy="155" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="158" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="161" r="1.5" fill="#ff4466"/>
    <circle cx="115" cy="162" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="165" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="168" r="1.5" fill="#ff4466"/>
  </g>
  <!-- LED indicator rack 3 -->
  <circle cx="67" cy="170" r="2" fill="#ff0033" filter="url(#glow)"/>

  <!-- ═══════════════════════════════════════════
       RACK UNIT 2 (middle)
  ═══════════════════════════════════════════ -->
  <!-- Left face -->
  <polygon points="60,142 100,120 100,84 60,106" fill="url(#leftFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Right face -->
  <polygon points="100,120 140,142 140,106 100,84" fill="url(#rightFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="60,106 100,84 140,106 100,128" fill="url(#rackTop)" filter="url(#softglow)" stroke="#ff4466" stroke-width="0.8"/>

  <!-- Rack 2 details - left face vents -->
  <g filter="url(#softglow)" opacity="0.9">
    <line x1="65" y1="112" x2="85" y2="123" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="117" x2="85" y2="128" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="122" x2="85" y2="133" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="65" y1="127" x2="85" y2="138" stroke="#ff6688" stroke-width="1.2"/>
  </g>
  <!-- Rack 2 details - right face dots -->
  <g filter="url(#softglow)" opacity="0.8">
    <circle cx="115" cy="112" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="115" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="118" r="1.5" fill="#ff4466"/>
    <circle cx="115" cy="119" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="122" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="125" r="1.5" fill="#ff4466"/>
    <circle cx="115" cy="126" r="1.5" fill="#ff4466"/>
    <circle cx="120" cy="129" r="1.5" fill="#ff4466"/>
    <circle cx="125" cy="132" r="1.5" fill="#ff4466"/>
  </g>
  <!-- LED indicator rack 2 -->
  <circle cx="67" cy="134" r="2" fill="#ff0033" filter="url(#glow)"/>

  <!-- ═══════════════════════════════════════════
       RACK UNIT 1 (top) — with display panel
  ═══════════════════════════════════════════ -->
  <!-- Left face -->
  <polygon points="60,106 100,84 100,48 60,70" fill="url(#leftFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Right face -->
  <polygon points="100,84 140,106 140,70 100,48" fill="url(#rightFace)" stroke="#ff2244" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="60,70 100,48 140,70 100,92" fill="url(#topFace)" filter="url(#glow)" stroke="#ff6688" stroke-width="1"/>

  <!-- Display panel on left face (like the blue window in reference) -->
  <polygon points="68,76 88,87 88,100 68,89" fill="#1f0a0f" stroke="#ff4466" stroke-width="0.8"/>
  <!-- Panel inner glow lines -->
  <g filter="url(#softglow)" opacity="0.9">
    <line x1="70" y1="80" x2="86" y2="89" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="70" y1="85" x2="86" y2="94" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="70" y1="90" x2="86" y2="99" stroke="#ff2244" stroke-width="1.5"/>
  </g>

  <!-- Right face vents -->
  <g filter="url(#softglow)" opacity="0.9">
    <line x1="105" y1="76" x2="135" y2="93" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="105" y1="82" x2="135" y2="99" stroke="#ff6688" stroke-width="1.2"/>
    <line x1="105" y1="88" x2="135" y2="105" stroke="#ff6688" stroke-width="1.2"/>
  </g>
  <!-- LED indicator rack 1 -->
  <circle cx="67" cy="98" r="2" fill="#ff0033" filter="url(#glow)"/>

  <!-- ═══════════════════════════════════════════
       TOP CAP GLOW
  ═══════════════════════════════════════════ -->
  <polygon points="60,70 100,48 140,70 100,92" fill="none" stroke="#ff4466" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <!-- Inner top highlight -->
  <polygon points="70,70 100,54 130,70 100,86" fill="none" stroke="#ff8899" stroke-width="0.8" opacity="0.5"/>

  <!-- Outer border glow on whole rack -->
  <polygon points="60,178 60,70 100,48 140,70 140,178 100,200" fill="none" stroke="#ff2244" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
</svg>
